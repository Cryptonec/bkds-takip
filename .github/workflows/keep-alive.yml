name: Keep Alive — Render Servislerini Uyandır

on:
  schedule:
    - cron: '*/5 * * * *'    # Her 5 dakikada bir
  workflow_dispatch:           # Elle de tetiklenebilir

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: bkds-takip
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 55 https://bkds-takip.onrender.com)
          echo "bkds-takip: $code"

      - name: rehapp-backend
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 55 https://rehapp-backend.onrender.com/api/health)
          echo "rehapp-backend: $code"

      - name: rehapp-frontend
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 55 https://rehapp-frontend.onrender.com)
          echo "rehapp-frontend: $code"
