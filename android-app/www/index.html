<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BKDS Takip</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #2563eb;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 36px; height: 36px; color: white; fill: none; stroke: currentColor; stroke-width: 2; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { font-size: 0.875rem; color: #64748b; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #1e293b;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ef4444; font-size: 0.875rem; text-align: center; display: none; }
    .retry-btn {
      display: none;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  </div>
  <h1>BKDS Takip</h1>
  <div class="spinner" id="spinner"></div>
  <p id="status">Sunucuya bağlanıyor...</p>
  <p class="error" id="errorMsg"></p>
  <button class="retry-btn" id="retryBtn" onclick="tryConnect()">Tekrar Dene</button>

  <script src="js/config.js"></script>
  <script>
    var serverUrl = (window.BKDS_CONFIG && window.BKDS_CONFIG.SERVER_URL) || 'http://192.168.1.100:3000';
    var ekranUrl  = serverUrl.replace(/\/$/, '') + '/ekran';
    var attempts  = 0;
    var maxWait   = 30; // saniye

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('retryBtn').style.display = 'block';
    }

    function tryConnect() {
      attempts++;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('status').style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('retryBtn').style.display = 'none';
      document.getElementById('status').textContent = 'Sunucuya bağlanıyor... (' + attempts + ')';

      var ctrl = new AbortController();
      var t = setTimeout(function() { ctrl.abort(); }, 8000);

      fetch(ekranUrl, { method: 'HEAD', signal: ctrl.signal, cache: 'no-cache' })
        .then(function(r) {
          clearTimeout(t);
          // 200 veya 302/redirect → sunucu hazır, yönlendir
          window.location.href = ekranUrl;
        })
        .catch(function(err) {
          clearTimeout(t);
          if (attempts < maxWait / 2) {
            setTimeout(tryConnect, 2000);
          } else {
            showError('Sunucuya ulaşılamıyor: ' + serverUrl + '\nLütfen sunucunun çalıştığından emin olun.');
          }
        });
    }

    // Sayfa yüklenince hemen dene
    document.addEventListener('DOMContentLoaded', tryConnect);
  </script>
</body>
</html>
